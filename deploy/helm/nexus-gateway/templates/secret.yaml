{{/*
Shared-secret Secret. Only rendered when the user did NOT supply an
existingSecret. Values are taken from .Values.secrets when set; blanks are
filled with generated randoms that PERSIST across upgrades via lookup (so we
never rotate CREDENTIAL_ENCRYPTION_KEY / ADMIN_KEY_HMAC_SECRET underneath
already-encrypted rows or issued keys).
*/}}
{{- if not .Values.secrets.existingSecret }}
{{- $name := printf "%s-secrets" (include "nexus.fullname" .) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) }}
{{- $data := dict }}
{{- if $existing }}{{ $data = $existing.data }}{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "nexus.labels" . | nindent 4 }}
type: Opaque
data:
  internalServiceToken: {{ include "nexus.secretVal" (dict "given" .Values.secrets.internalServiceToken "existingB64" (get $data "internalServiceToken") "len" 64) }}
  hubConfigToken: {{ include "nexus.secretVal" (dict "given" .Values.secrets.hubConfigToken "existingB64" (get $data "hubConfigToken") "len" 64) }}
  adminKeyHmacSecret: {{ include "nexus.secretVal" (dict "given" .Values.secrets.adminKeyHmacSecret "existingB64" (get $data "adminKeyHmacSecret") "len" 64) }}
  credentialEncryptionKey: {{ include "nexus.secretVal" (dict "given" .Values.secrets.credentialEncryptionKey "existingB64" (get $data "credentialEncryptionKey") "len" 64) }}
  complianceProxyApiToken: {{ include "nexus.secretVal" (dict "given" .Values.secrets.complianceProxyApiToken "existingB64" (get $data "complianceProxyApiToken") "len" 64) }}
  aiGatewayApiToken: {{ include "nexus.secretVal" (dict "given" .Values.secrets.aiGatewayApiToken "existingB64" (get $data "aiGatewayApiToken") "len" 64) }}
{{- end }}
