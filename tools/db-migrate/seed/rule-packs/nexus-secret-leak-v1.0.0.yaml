name: nexus/secret-leak
version: v1.0.0
maintainer: nexus
description: >-
  API key and credential patterns for common providers. Day-1 list covers
  AWS / GCP / Azure / OpenAI / Anthropic / GitHub / Stripe / Slack / SSH /
  JWT + an optional entropy-gated generic bearer pattern. All rules emit
  severity:restricted so the pipeline-level severity picker escalates.
rules:
  # --- AWS ---
  - id: sl-aws-access
    category: secret_leak.aws
    severity: hard
    pattern: '(?i)\b(AKIA|ASIA)[0-9A-Z]{16}\b'
    description: AWS Access Key ID (long-term or session).
    labels: [detector:secret-leak, provider:aws, severity:restricted]
  - id: sl-aws-secret
    category: secret_leak.aws
    severity: hard
    pattern: '(?i)aws(?:_secret_access_key|\s+secret(?:\s+access)?\s+key)\s*[:=]\s*["'']?([A-Za-z0-9/+=]{40})'
    description: AWS Secret labeled context.
    labels: [detector:secret-leak, provider:aws, severity:restricted]
  # --- GCP ---
  - id: sl-gcp-api
    category: secret_leak.gcp
    severity: hard
    pattern: '\bAIza[0-9A-Za-z_-]{35}\b'
    description: Google Cloud API key.
    labels: [detector:secret-leak, provider:gcp, severity:restricted]
  - id: sl-gcp-svc
    category: secret_leak.gcp
    severity: hard
    pattern: '"type"\s*:\s*"service_account"'
    description: GCP service-account JSON header.
    labels: [detector:secret-leak, provider:gcp, severity:restricted]
  # --- Azure ---
  - id: sl-azure-storage
    category: secret_leak.azure
    severity: hard
    pattern: '(?i)DefaultEndpointsProtocol=https?;AccountName=[^;]+;AccountKey=[A-Za-z0-9+/=]{80,100};'
    description: Azure storage connection string.
    labels: [detector:secret-leak, provider:azure, severity:restricted]
  - id: sl-azure-sub
    category: secret_leak.azure
    severity: soft
    pattern: '(?i)subscription[_\s-]?id\s*[:=]\s*["'']?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
    labels: [detector:secret-leak, provider:azure, severity:confidential]
  # --- OpenAI ---
  - id: sl-openai
    category: secret_leak.openai
    severity: hard
    pattern: '\bsk-(?:proj-)?[A-Za-z0-9_-]{40,}'
    description: OpenAI API key (classic + project-scoped).
    labels: [detector:secret-leak, provider:openai, severity:restricted]
  # --- Anthropic ---
  - id: sl-anthropic
    category: secret_leak.anthropic
    severity: hard
    pattern: '\bsk-ant-[A-Za-z0-9_-]{40,}'
    description: Anthropic API key.
    labels: [detector:secret-leak, provider:anthropic, severity:restricted]
  # --- GitHub ---
  - id: sl-gh-classic
    category: secret_leak.github
    severity: hard
    pattern: '\bgh[pousr]_[A-Za-z0-9]{36,}\b'
    description: GitHub classic PAT / OAuth / user / server / refresh token.
    labels: [detector:secret-leak, provider:github, severity:restricted]
  - id: sl-gh-fine
    category: secret_leak.github
    severity: hard
    pattern: '\bgithub_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}\b'
    description: GitHub fine-grained PAT.
    labels: [detector:secret-leak, provider:github, severity:restricted]
  # --- Stripe ---
  - id: sl-stripe
    category: secret_leak.stripe
    severity: hard
    pattern: '\b(?:sk|rk)_(?:live|test)_[A-Za-z0-9]{20,}\b'
    description: Stripe secret key (live/test).
    labels: [detector:secret-leak, provider:stripe, severity:restricted]
  # --- Slack ---
  - id: sl-slack-bot
    category: secret_leak.slack
    severity: hard
    pattern: '\bxox[abpr]-[A-Za-z0-9-]{10,}\b'
    description: Slack bot / app / user / refresh token.
    labels: [detector:secret-leak, provider:slack, severity:restricted]
  # --- SSH ---
  - id: sl-ssh-private
    category: secret_leak.ssh
    severity: hard
    pattern: '-----BEGIN (?:RSA |DSA |EC |OPENSSH )?PRIVATE KEY-----'
    description: SSH private key header.
    labels: [detector:secret-leak, provider:ssh, severity:restricted]
  # --- JWT (loose — require three base64url segments) ---
  - id: sl-jwt
    category: secret_leak.jwt
    severity: soft
    pattern: '\beyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}\b'
    description: JWT-shaped token.
    labels: [detector:secret-leak, format:jwt, severity:confidential]
  # --- Heroku ---
  - id: sl-heroku
    category: secret_leak.heroku
    severity: soft
    pattern: '\bhrku-[A-Za-z0-9_-]{30,}\b'
    labels: [detector:secret-leak, provider:heroku, severity:restricted]
  # --- Generic high-entropy (conservative) ---
  # Gated by specific-enough structure + length to reduce FP on random IDs.
  - id: sl-generic-bearer
    category: secret_leak.generic
    severity: warn
    pattern: '(?i)(?:authorization|bearer|api[_-]?key)\s*[:=]\s*["'']?[A-Za-z0-9_-]{30,}'
    description: Labeled bearer / API-key context with a 30+ char opaque value.
    labels: [detector:secret-leak, format:bearer, severity:confidential]
  # --- PEM certs (informational) ---
  - id: sl-pem-cert
    category: secret_leak.pem
    severity: warn
    pattern: '-----BEGIN CERTIFICATE-----'
    labels: [detector:secret-leak, format:pem, severity:internal]
  # --- .env leakage ---
  - id: sl-env-block
    category: secret_leak.env
    severity: soft
    pattern: '(?m)^[A-Z_][A-Z0-9_]{3,}\s*=\s*(?:sk-|AKIA|AIza|ghp_|xoxb-)[A-Za-z0-9_-]{10,}'
    description: .env-style line with a known-prefix secret value.
    labels: [detector:secret-leak, format:dotenv, severity:confidential]
  # --- SendGrid / Twilio / etc. shorter set ---
  - id: sl-sendgrid
    category: secret_leak.sendgrid
    severity: hard
    pattern: '\bSG\.[A-Za-z0-9_-]{22}\.[A-Za-z0-9_-]{43}\b'
    labels: [detector:secret-leak, provider:sendgrid, severity:restricted]
  - id: sl-twilio
    category: secret_leak.twilio
    severity: hard
    pattern: '\bAC[a-f0-9]{32}\b'
    description: Twilio Account SID (paired with Auth Token in practice).
    labels: [detector:secret-leak, provider:twilio, severity:restricted]
  - id: sl-mailgun
    category: secret_leak.mailgun
    severity: hard
    pattern: '\bkey-[a-f0-9]{32}\b'
    labels: [detector:secret-leak, provider:mailgun, severity:restricted]
  - id: sl-square
    category: secret_leak.square
    severity: hard
    pattern: '\bsq0(?:atp|csp|idp)-[A-Za-z0-9_-]{20,}\b'
    labels: [detector:secret-leak, provider:square, severity:restricted]
  # ====================================================================
  # Expansion set — additional providers + structured key formats.
  # Hard = unambiguous structured prefix; soft/warn = labeled heuristic
  # gated on provider name + assignment to keep false positives low.
  # ====================================================================
  # --- GitLab ---
  - id: sl-gitlab-pat
    category: secret_leak.gitlab
    severity: hard
    pattern: '\bglpat-[A-Za-z0-9_-]{20}\b'
    description: GitLab personal / project / group access token.
    labels: [detector:secret-leak, provider:gitlab, severity:restricted]
  # --- Google OAuth ---
  - id: sl-google-oauth
    category: secret_leak.google
    severity: hard
    pattern: '\bGOCSPX-[A-Za-z0-9_-]{28}\b'
    description: Google OAuth 2.0 client secret.
    labels: [detector:secret-leak, provider:google, severity:restricted]
  # --- npm ---
  - id: sl-npm
    category: secret_leak.npm
    severity: hard
    pattern: '\bnpm_[A-Za-z0-9]{36}\b'
    description: npm automation / publish access token.
    labels: [detector:secret-leak, provider:npm, severity:restricted]
  # --- PyPI ---
  - id: sl-pypi
    category: secret_leak.pypi
    severity: hard
    pattern: '\bpypi-AgEIcHlwaS5vcmc[A-Za-z0-9_-]{50,1000}'
    description: PyPI upload API token (macaroon).
    labels: [detector:secret-leak, provider:pypi, severity:restricted]
  # --- Docker Hub ---
  - id: sl-docker-hub
    category: secret_leak.docker
    severity: hard
    pattern: '\bdckr_pat_[A-Za-z0-9_-]{27}\b'
    description: Docker Hub personal access token.
    labels: [detector:secret-leak, provider:docker, severity:restricted]
  # --- HashiCorp Vault ---
  - id: sl-vault
    category: secret_leak.vault
    severity: hard
    pattern: '\bhv[bsr]\.[A-Za-z0-9]{24,}\b'
    description: HashiCorp Vault service / batch / recovery token (hvs. hvb. hvr.).
    labels: [detector:secret-leak, provider:vault, severity:restricted]
  # --- Terraform Cloud ---
  - id: sl-terraform-cloud
    category: secret_leak.terraform
    severity: hard
    pattern: '\b[a-z0-9]{14}\.atlasv1\.[A-Za-z0-9_=-]{60,70}'
    description: Terraform Cloud / Enterprise API token.
    labels: [detector:secret-leak, provider:terraform, severity:restricted]
  # --- Cloudflare ---
  - id: sl-cloudflare
    category: secret_leak.cloudflare
    severity: soft
    pattern: '(?i)cloudflare[a-z0-9_-]*(?:token|key)\s*[:=]\s*["'']?[A-Za-z0-9_-]{40}'
    description: Cloudflare API token in a labeled assignment.
    labels: [detector:secret-leak, provider:cloudflare, severity:confidential]
  # --- Datadog ---
  - id: sl-datadog-api
    category: secret_leak.datadog
    severity: soft
    pattern: '(?i)\bdd[_-]?api[_-]?key\s*[:=]\s*["'']?[a-f0-9]{32}\b'
    description: Datadog API key in a labeled assignment.
    labels: [detector:secret-leak, provider:datadog, severity:confidential]
  - id: sl-datadog-app
    category: secret_leak.datadog
    severity: soft
    pattern: '(?i)\bdd[_-]?app(?:lication)?[_-]?key\s*[:=]\s*["'']?[a-f0-9]{40}\b'
    description: Datadog application key in a labeled assignment.
    labels: [detector:secret-leak, provider:datadog, severity:confidential]
  # --- New Relic ---
  - id: sl-newrelic
    category: secret_leak.newrelic
    severity: hard
    pattern: '\bNRAK-[A-Za-z0-9]{27}\b'
    description: New Relic user API key.
    labels: [detector:secret-leak, provider:newrelic, severity:restricted]
  - id: sl-newrelic-ingest
    category: secret_leak.newrelic
    severity: hard
    pattern: '\bNR(?:JS|II)-[A-Za-z0-9]{19}\b'
    description: New Relic ingest browser / license key.
    labels: [detector:secret-leak, provider:newrelic, severity:restricted]
  # --- PagerDuty ---
  - id: sl-pagerduty
    category: secret_leak.pagerduty
    severity: soft
    pattern: '(?i)pager[_-]?duty[a-z0-9_-]*(?:token|key)\s*[:=]\s*["'']?[A-Za-z0-9+/=_-]{20,}'
    description: PagerDuty API token in a labeled assignment.
    labels: [detector:secret-leak, provider:pagerduty, severity:confidential]
  # --- Shopify ---
  - id: sl-shopify
    category: secret_leak.shopify
    severity: hard
    pattern: '\bshp(?:at|ca|pa|ss)_[a-fA-F0-9]{32}\b'
    description: Shopify access / custom-app / private-app / shared-secret token.
    labels: [detector:secret-leak, provider:shopify, severity:restricted]
  # --- Linear ---
  - id: sl-linear
    category: secret_leak.linear
    severity: hard
    pattern: '\blin_(?:api|oauth)_[A-Za-z0-9]{40}\b'
    description: Linear API or OAuth token.
    labels: [detector:secret-leak, provider:linear, severity:restricted]
  # --- Notion ---
  - id: sl-notion
    category: secret_leak.notion
    severity: hard
    pattern: '\bntn_[A-Za-z0-9]{40,}\b'
    description: Notion integration token.
    labels: [detector:secret-leak, provider:notion, severity:restricted]
  # --- Airtable ---
  - id: sl-airtable
    category: secret_leak.airtable
    severity: hard
    pattern: '\bpat[A-Za-z0-9]{14}\.[A-Za-z0-9]{64}\b'
    description: Airtable personal access token.
    labels: [detector:secret-leak, provider:airtable, severity:restricted]
  # --- Postman ---
  - id: sl-postman
    category: secret_leak.postman
    severity: hard
    pattern: '\bPMAK-[A-Fa-f0-9]{24}-[A-Fa-f0-9]{34}\b'
    description: Postman API key.
    labels: [detector:secret-leak, provider:postman, severity:restricted]
  # --- OpenAI (service-account / admin variants) ---
  - id: sl-openai-svc
    category: secret_leak.openai
    severity: hard
    pattern: '\bsk-(?:svcacct|admin)-[A-Za-z0-9_-]{20,}'
    description: OpenAI service-account and admin API keys.
    labels: [detector:secret-leak, provider:openai, severity:restricted]
  # --- Azure AD ---
  - id: sl-azure-ad-secret
    category: secret_leak.azure
    severity: hard
    pattern: '[A-Za-z0-9_~.]{3}[0-9]Q~[A-Za-z0-9_~.-]{31,34}'
    description: Azure AD application client secret.
    labels: [detector:secret-leak, provider:azure, severity:restricted]
  # --- DigitalOcean ---
  - id: sl-digitalocean
    category: secret_leak.digitalocean
    severity: hard
    pattern: '\bdo[opr]_v1_[a-f0-9]{64}\b'
    description: DigitalOcean personal / oauth / refresh token.
    labels: [detector:secret-leak, provider:digitalocean, severity:restricted]
  # --- Fastly ---
  - id: sl-fastly
    category: secret_leak.fastly
    severity: soft
    pattern: '(?i)fastly[a-z0-9_-]*(?:token|key)\s*[:=]\s*["'']?[A-Za-z0-9_-]{32}'
    description: Fastly API token in a labeled assignment.
    labels: [detector:secret-leak, provider:fastly, severity:confidential]
  # --- Algolia ---
  - id: sl-algolia
    category: secret_leak.algolia
    severity: soft
    pattern: '(?i)algolia[a-z0-9_-]*(?:admin|api)?[_-]?key\s*[:=]\s*["'']?[a-f0-9]{32}\b'
    description: Algolia admin / API key in a labeled assignment.
    labels: [detector:secret-leak, provider:algolia, severity:confidential]
  # --- Twilio (API key SID) ---
  - id: sl-twilio-apikey
    category: secret_leak.twilio
    severity: hard
    pattern: '\bSK[a-f0-9]{32}\b'
    description: Twilio API key SID (paired with a secret in practice).
    labels: [detector:secret-leak, provider:twilio, severity:restricted]
  # --- Brevo / Sendinblue ---
  - id: sl-brevo
    category: secret_leak.brevo
    severity: hard
    pattern: '\bxkeysib-[a-f0-9]{64}-[A-Za-z0-9]{16}\b'
    description: Brevo (Sendinblue) API key.
    labels: [detector:secret-leak, provider:brevo, severity:restricted]
  # --- Mailchimp ---
  - id: sl-mailchimp
    category: secret_leak.mailchimp
    severity: hard
    pattern: '\b[a-f0-9]{32}-us[0-9]{1,2}\b'
    description: Mailchimp API key with datacenter suffix.
    labels: [detector:secret-leak, provider:mailchimp, severity:restricted]
  # --- Discord ---
  - id: sl-discord-bot
    category: secret_leak.discord
    severity: soft
    pattern: '\b[MNO][A-Za-z0-9_-]{23,25}\.[A-Za-z0-9_-]{6}\.[A-Za-z0-9_-]{27,38}\b'
    description: Discord bot token.
    labels: [detector:secret-leak, provider:discord, severity:confidential]
  # --- Telegram ---
  - id: sl-telegram-bot
    category: secret_leak.telegram
    severity: soft
    pattern: '\b[0-9]{8,10}:A[A-Za-z0-9_-]{34,35}\b'
    description: Telegram bot API token.
    labels: [detector:secret-leak, provider:telegram, severity:confidential]
  # --- Stripe (webhook signing secret) ---
  - id: sl-stripe-webhook
    category: secret_leak.stripe
    severity: hard
    pattern: '\bwhsec_[A-Za-z0-9]{32,}\b'
    description: Stripe webhook signing secret.
    labels: [detector:secret-leak, provider:stripe, severity:restricted]
  # --- PGP private key ---
  - id: sl-pgp-private
    category: secret_leak.pgp
    severity: hard
    pattern: '-----BEGIN PGP PRIVATE KEY BLOCK-----'
    description: PGP private key block header.
    labels: [detector:secret-leak, format:pgp, severity:restricted]
  # --- Generic high-entropy secret assignment (conservative) ---
  # Requires a secret-ish key name AND a quoted 32+ char opaque value, so it
  # does not fire on ordinary identifiers. Distinct from sl-generic-bearer,
  # which keys on authorization / bearer / api-key headers.
  - id: sl-generic-secret-assign
    category: secret_leak.generic
    severity: warn
    pattern: '(?i)\b(?:secret|token|passwd|password|credential|private[_-]?key)\s*[:=]\s*["''][A-Za-z0-9+/=._-]{32,}["'']'
    description: Quoted secret / token / password assignment with a 32+ char opaque value.
    labels: [detector:secret-leak, format:secret, severity:confidential]
  # ====================================================================
  # Expansion set 2 — additional provider prefixes (gitleaks/trufflehog
  # taxonomy). Every pattern below carries a >=3 char required literal run
  # so the Vectorscan literal prefilter accelerates it; repeats are bounded
  # to the real token length.
  # ====================================================================
  # --- Slack incoming webhook ---
  - id: sl-slack-webhook
    category: secret_leak.slack
    severity: hard
    pattern: '\bhooks\.slack\.com/(?:services|workflows|triggers)/[A-Za-z0-9+/]{43,56}\b'
    description: Slack incoming webhook URL (services / workflows / triggers).
    labels: [detector:secret-leak, provider:slack, severity:restricted]
  # --- Notion (legacy secret_ integration token) ---
  - id: sl-notion-secret
    category: secret_leak.notion
    severity: hard
    pattern: '\bsecret_[A-Za-z0-9]{43}\b'
    description: Notion legacy integration token (secret_ prefix).
    labels: [detector:secret-leak, provider:notion, severity:restricted]
  # --- Figma ---
  - id: sl-figma
    category: secret_leak.figma
    severity: hard
    pattern: '\bfigd_[A-Za-z0-9_-]{40,43}\b'
    description: Figma personal access token.
    labels: [detector:secret-leak, provider:figma, severity:restricted]
  # --- Databricks ---
  - id: sl-databricks
    category: secret_leak.databricks
    severity: hard
    pattern: '\bdapi[a-f0-9]{32}(?:-[0-9]+)?\b'
    description: Databricks personal access token.
    labels: [detector:secret-leak, provider:databricks, severity:restricted]
  # --- Atlassian / Jira / Confluence API token ---
  - id: sl-atlassian
    category: secret_leak.atlassian
    severity: hard
    pattern: '\bAT(?:ATT3|CTT3)[A-Za-z0-9_=-]{180,256}\b'
    description: Atlassian Cloud API token (ATATT3 / ATCTT3 prefix).
    labels: [detector:secret-leak, provider:atlassian, severity:restricted]
  # --- Dropbox ---
  - id: sl-dropbox
    category: secret_leak.dropbox
    severity: hard
    pattern: '\bsl\.[A-Za-z0-9_-]{130,152}\b'
    description: Dropbox short-lived access token (sl. prefix).
    labels: [detector:secret-leak, provider:dropbox, severity:restricted]
  # --- Grafana (service-account + cloud-access tokens) ---
  - id: sl-grafana
    category: secret_leak.grafana
    severity: hard
    pattern: '\bgl(?:sa|c)_[A-Za-z0-9]{32,}\b'
    description: Grafana service-account (glsa_) or cloud-access (glc_) token.
    labels: [detector:secret-leak, provider:grafana, severity:restricted]
  # --- Sentry ---
  - id: sl-sentry
    category: secret_leak.sentry
    severity: hard
    pattern: '\bsntrys_[A-Za-z0-9+/=_.-]{80,}'
    description: Sentry user / org auth token (sntrys_ prefix).
    labels: [detector:secret-leak, provider:sentry, severity:restricted]
  # --- Doppler ---
  - id: sl-doppler
    category: secret_leak.doppler
    severity: hard
    pattern: '\bdp\.(?:pt|st|ct|sa|scim|audit)\.[A-Za-z0-9]{40,44}\b'
    description: Doppler service / personal / CLI / service-account token.
    labels: [detector:secret-leak, provider:doppler, severity:restricted]
  # --- PlanetScale ---
  - id: sl-planetscale
    category: secret_leak.planetscale
    severity: hard
    pattern: '\bpscale_(?:tkn|pw|oauth)_[A-Za-z0-9_.-]{32,}\b'
    description: PlanetScale service token / database password / OAuth token.
    labels: [detector:secret-leak, provider:planetscale, severity:restricted]
  # --- Prefect ---
  - id: sl-prefect
    category: secret_leak.prefect
    severity: hard
    pattern: '\bpn[ub]_[A-Za-z0-9]{32,36}\b'
    description: Prefect Cloud user / service API key.
    labels: [detector:secret-leak, provider:prefect, severity:restricted]
  # --- Flutterwave ---
  - id: sl-flutterwave
    category: secret_leak.flutterwave
    severity: hard
    pattern: '\bFLWSECK_TEST-[a-h0-9]{32}-X\b'
    description: Flutterwave test secret key.
    labels: [detector:secret-leak, provider:flutterwave, severity:restricted]
  # --- GitLab CI runner registration token ---
  - id: sl-gitlab-runner
    category: secret_leak.gitlab
    severity: hard
    pattern: '\bGR1348941[A-Za-z0-9_-]{20}\b'
    description: GitLab runner registration token.
    labels: [detector:secret-leak, provider:gitlab, severity:restricted]
  # --- Clojars ---
  - id: sl-clojars
    category: secret_leak.clojars
    severity: hard
    pattern: '\bCLOJARS_[a-z0-9]{60}\b'
    description: Clojars deploy token.
    labels: [detector:secret-leak, provider:clojars, severity:restricted]
  # --- RubyGems ---
  - id: sl-rubygems
    category: secret_leak.rubygems
    severity: hard
    pattern: '\brubygems_[a-f0-9]{48}\b'
    description: RubyGems API key.
    labels: [detector:secret-leak, provider:rubygems, severity:restricted]
  # --- ReadMe.io ---
  - id: sl-readme
    category: secret_leak.readme
    severity: hard
    pattern: '\brdme_[a-z0-9]{70}\b'
    description: ReadMe.io API access token.
    labels: [detector:secret-leak, provider:readme, severity:restricted]
  # --- Frame.io ---
  - id: sl-frameio
    category: secret_leak.frameio
    severity: hard
    pattern: '\bfio-u-[A-Za-z0-9_-]{64}\b'
    description: Frame.io developer token.
    labels: [detector:secret-leak, provider:frameio, severity:restricted]
  # --- Shippo ---
  - id: sl-shippo
    category: secret_leak.shippo
    severity: hard
    pattern: '\bshippo_(?:live|test)_[a-f0-9]{40}\b'
    description: Shippo live / test API token.
    labels: [detector:secret-leak, provider:shippo, severity:restricted]
  # --- CircleCI personal access token ---
  - id: sl-circleci
    category: secret_leak.circleci
    severity: hard
    pattern: '\bCCIPAT_[A-Za-z0-9]{22}_[A-Za-z0-9]{40}\b'
    description: CircleCI personal access token.
    labels: [detector:secret-leak, provider:circleci, severity:restricted]
  # --- Typeform ---
  - id: sl-typeform
    category: secret_leak.typeform
    severity: hard
