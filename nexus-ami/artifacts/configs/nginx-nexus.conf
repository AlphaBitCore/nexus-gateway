# Nexus Gateway — nginx reverse proxy for the AMI / appliance form factor.
# Serves the Vite-built React UI on :443 and proxies /api/* to the Control
# Plane on localhost:3001. Architecture:
# docs/developers/architecture/cross-cutting/deployment/ami-appliance-architecture.md
#
# Operator note: the self-signed cert at /etc/nexus/tls.{crt,key} is generated
# by first-boot-ca.sh on first launch. For production, replace those two files
# with a cert signed for your hostname and `systemctl reload nginx`.

server {
    listen      80 default_server;
    server_name _;
    return      301 https://$host$request_uri;
}

server {
    listen              443 ssl default_server;
    server_name         _;

    ssl_certificate     /etc/nexus/tls.crt;
    ssl_certificate_key /etc/nexus/tls.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root                /opt/nexus/ui;
    index               index.html;

    client_max_body_size 32m;

    # Vite SPA fallback — every unmatched path serves index.html so the
    # client-side router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin API + auth-server endpoints (both live in the control-plane
    # binary on :3001).
    #
    # proxy_buffering off so the admin SSE surfaces stream instead of being
    # buffered into one late chunk: the compliance-overview export
    # (GET /api/admin/.../compliance export) and the AI Gateway Simulator
    # forward (POST /api/admin/ai-gateway-simulator/forward), which flushes
    # per upstream chat-completion chunk.
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # SCIM 2.0 provisioning (Okta / Entra ID push user+group sync). Served by
    # the control-plane binary at /scim/v2/*. Without this block the SPA
    # try_files fallback returns index.html (HTML) to the IdP, which fails
    # SCIM discovery. Internal-service-token / bearer gated by the handler.
    location /scim/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # AI Gateway ingress (:3050). One regex block covers every ingress wire
    # format the gateway speaks:
    #   /v1/...                         OpenAI canonical (chat/completions,
    #                                   embeddings, responses, messages,
    #                                   estimate, models, models/{id}, usage)
    #   /v1beta/models/{model}:...      Gemini native
    #   /openai/deployments/{dep}/...   Azure OpenAI native
    #   /api/paas/v4/...                GLM / Zhipu native
    # Regex so /api/paas wins over the plain `/api/` prefix above (regex
    # locations are matched before plain-prefix locations in nginx). The
    # gateway's /internal/* control endpoints and /metrics are deliberately
    # NOT matched here — they stay loopback-only.
    # proxy_buffering off + HTTP/1.1 so SSE streaming (stream:true chat,
    # streamGenerateContent) is relayed chunk-by-chunk, not buffered.
    location ~ ^/(v1|v1beta|openai/deployments|api/paas)(/|$) {
        proxy_pass         http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # Nexus Hub (:3060) — remote endpoint-agent connectivity only. Agents
    # enrolled with `--hub-url https://<this-host>` reach the Hub over 443:
    #   GET  /ws                        persistent control WebSocket
    #   POST /api/internal/things/...    enrollment + thingclient HTTP fallback
    #                                    (register/heartbeat/shadow/config/
    #                                    audit/deregister/break-glass)
    # Both are bearer-token gated by the Hub (per-device token, enrollment
    # token, or internal-service token), so internet exposure is auth-bounded.
    # `/api/internal/things/` is a more specific prefix than the `/api/`
    # control-plane block above, so it wins for agent traffic while every
    # other /api/internal/* path still routes to the control-plane.
    # The Hub admin API (/api/hub/*), /metrics, and /healthz are NOT exposed.
    location /ws {
        proxy_pass         http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/internal/things/ {
        proxy_pass         http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /.well-known/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
    }

    # OAuth/OIDC auth-server endpoints (authorization endpoint, token
    # endpoint, userinfo, revoke, logout — all live in the control-plane
    # binary). Without this location block /oauth/authorize falls through
    # to the SPA `try_files` handler, the SPA can't process the PKCE
    # parameters, bounces to /login, /login bounces to /oauth/authorize,
    # infinite loop. Hit on 2026-05-29 first-user-test of build #10.
    location /oauth/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Auth-server pre-bearer endpoints (`/authserver/idps`, `/authserver/
    # password`, `/authserver/idp/<id>/start`). The SPA's LoginPage calls
    # these to list IDPs and post password credentials. Without the proxy
    # they return the SPA index.html (200 with HTML body), which the SPA's
    # JSON parser misreads as "loadProvidersFailed" — surfaced to the
    # operator as "Unable to load sign-in methods". Hit on 2026-05-29.
    location /authserver/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health + readiness endpoints exposed for ELB / customer monitoring
    # without authentication. The control-plane serves these at the ROOT
    # (`/healthz`, `/ready`), not under /api — the proxy_pass therefore omits
    # a URI so nginx forwards the original path verbatim. (The previous
    # `proxy_pass .../api/healthz` rewrote to a path the CP does not serve and
    # returned 404 {"message":"Not Found"}.)
    location = /healthz {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
    }

    location = /ready {
        proxy_pass         http://127.0.0.1:3001;
        proxy_set_header   Host              $host;
    }
}
