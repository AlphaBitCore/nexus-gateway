openapi: 3.1.0
info:
  title: Admin Credentials – Reliability surface (E41 v2)
  version: "2.0.0"
  description: |
    Extends the admin credentials API with the durable multi-window
    reliability state, per-credential threshold overrides, synchronous
    probe, and the global reliability settings document. See
    docs/developers/architecture/control-plane/credentials-architecture.md for the full pipeline.
paths:
  /api/admin/credentials/{id}:
    get:
      summary: Get a single credential
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Credential metadata + reliability fields + live circuit view
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CredentialDetail" }

  /api/admin/credentials:
    get:
      summary: List credentials
      responses:
        "200":
          description: Page of credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/CredentialDetail" }
                  total: { type: integer }

  /api/admin/credentials/{id}/circuit-reset:
    post:
      summary: Reset the circuit breaker for a credential
      description: |
        Synchronously DELs the cred:circuit:{id} Redis hash. The next
        credential-circuit-flush cycle propagates the closed state to the
        Credential table.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Reset succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  reset: { type: boolean }
                  id: { type: string }

  /api/admin/credentials/{id}/probe:
    post:
      summary: Run a synchronous diagnostic probe
      description: |
        Proxies to AI Gateway's POST /internal/v1/credentials/{id}/probe,
        which decrypts the credential, runs adapter.Probe against the
        upstream provider, and returns the outcome. No traffic_event is
        recorded.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                timeoutSeconds:
                  type: integer
                  minimum: 1
                  maximum: 30
                  default: 5
      responses:
        "200":
          description: Probe completed (success or upstream failure)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProbeResult" }
        "404":
          description: Credential not found

  /api/admin/credentials/{id}/reliability-overrides:
    put:
      summary: Set per-credential reliability threshold overrides
      description: |
        Accepts a partial Thresholds JSON (any subset of the seven
        fields). Sending null or an empty object clears the override.
        The CP triggers hub.InvalidateConfig("ai-gateway", "credentials")
        so the AI Gateway cachelayer snapshot reloads on the next push.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - { type: "null" }
                - { $ref: "#/components/schemas/ReliabilityThresholds" }
      responses:
        "200":
          description: Override saved (or cleared)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  reliabilityOverrides:
                    oneOf:
                      - { type: "null" }
                      - { $ref: "#/components/schemas/ReliabilityThresholds" }
        "400":
          description: Validation failed
        "404":
          description: Credential not found

  /api/admin/settings/credential-reliability:
    get:
      summary: Get the global credential reliability thresholds
      responses:
        "200":
          description: Defaults + admin override + effective merge
          content:
            application/json:
              schema:
                type: object
                required: [defaults, override, effective]
                properties:
                  defaults:  { $ref: "#/components/schemas/ReliabilityThresholds" }
                  override:  { $ref: "#/components/schemas/ReliabilityThresholds" }
                  effective: { $ref: "#/components/schemas/ReliabilityThresholds" }
    put:
      summary: Replace the global credential reliability thresholds
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReliabilityThresholds" }
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  override:  { $ref: "#/components/schemas/ReliabilityThresholds" }
                  effective: { $ref: "#/components/schemas/ReliabilityThresholds" }
        "400":
          description: Validation failed (degraded ≥ healthy, healthy > 100, non-positive)

components:
  schemas:
    ReliabilityThresholds:
      type: object
      description: |
        All seven fields are positive integers. Validation invariants:
        degradedThresholdPct < healthyThresholdPct ≤ 100. In override
        payloads (per-credential or partial admin save) any subset of
        fields may be omitted; missing fields inherit from the next layer.
      properties:
        authFailThreshold:
          type: integer
          minimum: 1
          description: Consecutive 401/403 responses before circuit opens with auth_fail.
        rateLimitCooldownSeconds:
          type: integer
          minimum: 1
          description: How long a rate_limit OPEN circuit stays open before auto-half_open.
        healthyThresholdPct:
          type: integer
          minimum: 1
          maximum: 100
        degradedThresholdPct:
          type: integer
          minimum: 1
          maximum: 99
        healthMinSamples:
          type: integer
          minimum: 1
        healthWindowSeconds:
          type: integer
          minimum: 1
        healthSustainedDegradedSeconds:
          type: integer
          minimum: 1

    ProbeResult:
      type: object
      required: [ok, latencyMs, credentialId, probedAt]
      properties:
        ok:           { type: boolean }
        latencyMs:    { type: integer }
        detail:       { type: string }
        error:        { type: string }
        providerName: { type: string }
        adapterType:  { type: string }
        credentialId:   { type: string }
        credentialName: { type: string }
        probedAt:     { type: string, format: date-time }

    CredentialDetail:
      type: object
      required:
        - id
        - name
        - providerId
        - enabled
        - circuitState
        - healthStatus
      properties:
        id:                       { type: string }
        name:                     { type: string }
        providerId:               { type: string }
        enabled:                  { type: boolean }
        lastUsedAt:               { type: string, format: date-time, nullable: true }
        lastSuccessAt:            { type: string, format: date-time, nullable: true }
        lastFailureAt:            { type: string, format: date-time, nullable: true }
        lastFailureReason:        { type: string, nullable: true }
        totalUsageCount:          { type: integer }
        # Circuit breaker durable state.
        circuitState:
          type: string
          enum: [closed, open, half_open]
        circuitReason:
          type: string
          enum: [auth_fail, rate_limit]
          nullable: true
        circuitOpenedAt:          { type: string, format: date-time, nullable: true }
        circuitNextProbeAt:       { type: string, format: date-time, nullable: true }
        # Health classification (multi-window).
        healthStatus:
          type: string
          enum: [healthy, degraded, unavailable, unknown, collecting]
        healthSuccessRate5m:      { type: number, nullable: true }
        healthSuccessRate1h:      { type: number, nullable: true }
        healthSamplesObserved:    { type: integer }
        healthDominantError:
          type: string
          enum: [none, auth_fail, rate_limit, upstream_5xx, timeout, client_error, mixed]
          nullable: true
        healthTrend:
          type: string
          enum: [improving, stable, degrading]
          nullable: true
        healthStatusChangedAt:    { type: string, format: date-time, nullable: true }
        healthCheckedAt:          { type: string, format: date-time, nullable: true }
        # Per-credential thresholds override.
        reliabilityOverrides:
          oneOf:
            - { type: "null" }
            - { $ref: "#/components/schemas/ReliabilityThresholds" }
        # Live Redis-side circuit view (present when cred:circuit:{id} exists).
        liveCircuit:
          type: object
          nullable: true
          required: [state, authFailsCurrent]
          properties:
            state:            { type: string, enum: [closed, open, half_open] }
            openReason:       { type: string, enum: [auth_fail, rate_limit] }
            openedAt:         { type: string, format: date-time }
            nextProbeAt:      { type: string, format: date-time }
            authFailsCurrent: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
